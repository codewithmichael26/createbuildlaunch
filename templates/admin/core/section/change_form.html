{% extends 'admin/change_form.html' %}
{% load i18n static %}

<!--
  Custom change form for the Section model.

  Adds SortableJS + admin_sortable.js so the SectionItem inline rows can be
  drag-reordered. Saving the new order is instant (AJAX) -- no form submit needed.
-->

{% block extrahead %}
{{ block.super }}
<style>
/* ── Drag handle ── */
.drag-handle {
    cursor: grab;
    font-size: 1.35rem;
    line-height: 1;
    color: #ccc;
    user-select: none;
    padding: 0 5px;
    display: inline-block;
    border-radius: 3px;
    transition: color .15s, background .15s;
}
.drag-handle:hover  { color: #417690; background: rgba(65, 118, 144, .12); }
.drag-handle:active { cursor: grabbing; }

/* ── SortableJS drag states ── */
.sortable-chosen { background: #eef5fb !important; }
.sortable-ghost  { opacity: .45; background: #d5e8f5 !important; }
</style>

<!-- SortableJS from jsDelivr -- same CDN the public site uses for Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="{% static 'js/admin_sortable.js' %}"></script>
{% endblock %}
