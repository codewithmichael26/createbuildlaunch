{% load static %}

<div class="container">
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
        <div class="col-md-4 d-flex align-items-center">
            <a href="{% url 'core:home' %}" class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1">
                {% if site.logo %}
                    <img src="{{ site.logo.url }}" alt="{{ site.name }}" height="24">
                {% else %}
                    <span class="fs-5">{{ site.name }}</span>
                {% endif %}
            </a>
            <p class="text-body-secondary">{{ site.copyright_text }}</p>
        </div>
        <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
            {% if site.instagram_url %}
                <li class="ms-3">
                    <a class="text-body-secondary" href="{{ site.instagram_url }}" aria-label="Instagram" target="_blank" rel="noopener">
                        <i class="bi bi-instagram fs-5"></i>
                    </a>
                </li>
            {% endif %}
            {% if site.facebook_url %}
                <li class="ms-3">
                    <a class="text-body-secondary" href="{{ site.facebook_url }}" aria-label="Facebook" target="_blank" rel="noopener">
                        <i class="bi bi-facebook fs-5"></i>
                    </a>
                </li>
            {% endif %}
            {% if site.twitter_url %}
                <li class="ms-3">
                    <a class="text-body-secondary" href="{{ site.twitter_url }}" aria-label="Twitter" target="_blank" rel="noopener">
                        <i class="bi bi-twitter-x fs-5"></i>
                    </a>
                </li>
            {% endif %}
            {% if site.linkedin_url %}
                <li class="ms-3">
                    <a class="text-body-secondary" href="{{ site.linkedin_url }}" aria-label="LinkedIn" target="_blank" rel="noopener">
                        <i class="bi bi-linkedin fs-5"></i>
                    </a>
                </li>
            {% endif %}
        </ul>
    </footer>
</div>
